name: Summary of GitHub Changelog
on:
  workflow_dispatch:
    inputs:
      post-date:
        description: 'Date for changelog summary (YYYY-MM-DD)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  summarize-github-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v6

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_PAT }}
        run: |
          copilot \
            --model "gpt-4.1" \
            --prompt "/github-changelog summary ${{ inputs.post-date }} save to ${{ inputs.post-date }}.md" \
            --yolo \
            --no-ask-user
          cat ${{ inputs.post-date }}.md >> "$GITHUB_STEP_SUMMARY"
