name: Summary of GitHub Changelog
on:
  workflow_dispatch:
    inputs:
      post-date:
        description: 'Date for changelog summary (YYYY-MM-DD)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  summarize-github-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Build output path
        id: output-path
        run: |
          POST_DATE="${{ inputs.post-date }}"
          YEAR="${POST_DATE:0:4}"
          MONTH="${POST_DATE:5:2}"
          OUTPUT_DIR="$YEAR/$MONTH"
          OUTPUT_PATH="$OUTPUT_DIR/$POST_DATE.md"
          mkdir -p "$OUTPUT_DIR"
          echo "output_path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js environment
        uses: actions/setup-node@v6

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_PAT }}
        run: |
          copilot \
            --model "gpt-4.1" \
            --prompt "/github-changelog summary ${{ inputs.post-date }} save to ${{ steps.output-path.outputs.output_path }}" \
            --yolo \
            --no-ask-user
          cat "${{ steps.output-path.outputs.output_path }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.output-path.outputs.output_path }}"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add GitHub changelog summary for ${{ inputs.post-date }}"
          git push origin HEAD:main
